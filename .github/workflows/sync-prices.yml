name: Sync Fuel Prices

on:
  schedule:
    # Run daily at 08:00 Lisbon time (UTC+0 in winter, UTC+1 in summer)
    # API Aberta syncs at 07:30, so 08:00 gives it time to finish
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run price sync
        run: npx tsx scripts/sync-prices.ts
        env:
          API_ABERTA_KEY: ${{ secrets.API_ABERTA_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
